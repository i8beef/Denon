name: build

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

env:
  DOTNETVERSION: "8.0.x"
  APP: "I8Beef.Denon"
  SOLUTION: "./src/I8Beef.Denon.sln"
  BUILDOUTPUTPATH: "./src/I8Beef.Denon/bin/Release/netstandard2.0"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK ${{ env.DOTNETVERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNETVERSION }}

      - name: Install dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --configuration Release --no-restore

      - name: Test
        run: dotnet test ${{ env.SOLUTION }} --no-restore --verbosity normal --logger trx --results-directory "TestResults"

      - name: Upload app build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP }}
          path: ${{ env.BUILDOUTPUTPATH }}

      - name: Upload TestResults build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults